apiVersion: v1
kind: ConfigMap
metadata:
  name: predsx-config
data:
  LOG_LEVEL: "info"
  KAFKA_BROKERS: "kafka:9092"
  REDIS_ADDR: "redis:6379"
  POSTGRES_URL: "postgres://postgres:postgres@postgres:5432/predsx?sslmode=disable"
  CLICKHOUSE_ADDR: "clickhouse:9000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-discovery
  template:
    metadata:
      labels:
        app: market-discovery
    spec:
      containers:
      - name: market-discovery
        image: predsx/market-discovery:latest
        envFrom:
        - configMapRef:
            name: predsx-config
        ports:
        - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: predsx/api:latest
        envFrom:
        - configMapRef:
            name: predsx-config
        ports:
        - containerPort: 8000
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
