# TLS overlay — apply on top of docker-compose.vps.yml when you have a domain:
#
#   docker compose \
#     -f docker-compose.vps.yml \
#     -f docker-compose.caddy.yml \
#     up -d
#
# Requires:
#   - DOMAIN=yourdomain.com set in deployments/.env
#   - Port 80 and 443 open in UFW (see docs/port-security.md)
#   - DNS A record for DOMAIN pointing at your VPS IP
#
# Caddy handles TLS automatically via Let's Encrypt.
# hub-api port 8088 is removed from public exposure — all traffic goes through Caddy.

services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      hub-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Override hub-api to remove the direct 8088 port — Caddy is the only entry point
  hub-api:
    ports: !reset []

volumes:
  caddy_data:
  caddy_config:
